<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; overflow: hidden; height: 100%; }
  body { display: grid; place-items: center; cursor: pointer; -webkit-user-select: none; }
  #wrap { position: relative; width: 92px; height: 92px; }
  svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
  .ring  { fill: none; stroke: #6fd3ff; }
  #core  {
    position: absolute; inset: 29px; border-radius: 50%;
    background: radial-gradient(circle, rgba(111,211,255,0.85) 0%, rgba(111,211,255,0.25) 55%, transparent 75%);
    filter: blur(1px);
    transition: transform 60ms linear, opacity 200ms ease;
  }
  #r1 { opacity: 0.9; }
  #r2 { opacity: 0.45; animation: spin 24s linear infinite; transform-box: fill-box; transform-origin: center; }
  #r3 { opacity: 0.25; animation: spin 60s linear infinite reverse; transform-box: fill-box; transform-origin: center; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* idle breath */
  #wrap { animation: breathe 5s ease-in-out infinite; }
  @keyframes breathe { 0%,100% { filter: drop-shadow(0 0 6px rgba(111,211,255,0.35)); } 50% { filter: drop-shadow(0 0 16px rgba(111,211,255,0.6)); } }
  @media (prefers-reduced-motion: reduce) { #r2, #r3, #wrap { animation: none; } }
  /* listening: the arc reactor runs hot (amber) until you stop speaking */
  body.listening .ring { stroke: #ffb454; }
  body.listening #core {
    background: radial-gradient(circle, rgba(255,180,84,0.9) 0%, rgba(255,180,84,0.3) 55%, transparent 75%);
  }
  body.listening #wrap { animation: none; filter: drop-shadow(0 0 18px rgba(255,180,84,0.65)); }
  /* thinking: back to cyan but spinning with intent while whisper + chat work */
  body.thinking #r2 { animation-duration: 3s; }
  body.thinking #r3 { animation-duration: 5s; }
</style>
</head>
<body title="Jarvis - click to summon">
  <div id="wrap">
    <svg viewBox="0 0 120 120">
      <circle id="r1" class="ring" cx="60" cy="60" r="52" stroke-width="1.5"
        stroke-dasharray="2 4" />
      <circle id="r2" class="ring" cx="60" cy="60" r="44" stroke-width="1"
        stroke-dasharray="30 14 6 14" />
      <circle id="r3" class="ring" cx="60" cy="60" r="34" stroke-width="3"
        stroke-dasharray="1 7" />
    </svg>
    <div id="core"></div>
  </div>
  <audio id="player"></audio>
<script>
  const core = document.getElementById('core');
  const player = document.getElementById('player');

  // voice-reactive pulse: the orb breathes with Andrew's voice
  let analyser = null, pulseData = null, pulseRAF = null;
  function wireAnalyser() {
    if (analyser) return;
    const ctx = new AudioContext();
    const src = ctx.createMediaElementSource(player);
    analyser = ctx.createAnalyser();
    analyser.fftSize = 64;
    src.connect(analyser); analyser.connect(ctx.destination);
    pulseData = new Uint8Array(analyser.frequencyBinCount);
  }
  // run the pulse rAF ONLY while audio is actually playing. backgroundThrottling:false (added so mic
  // capture survives a hidden orb) also stops Chromium from throttling a hidden window's rAF, so an
  // always-on pulse loop would burn ~60fps of FFT + layout forever. Start on play, stop on ended/pause.
  function startPulse() {
    if (pulseRAF || !analyser) return;
    const tick = () => {
      analyser.getByteFrequencyData(pulseData);
      const level = pulseData.reduce((a, b) => a + b, 0) / pulseData.length / 255;
      core.style.transform = `scale(${1 + level * 0.9})`;
      pulseRAF = requestAnimationFrame(tick);
    };
    pulseRAF = requestAnimationFrame(tick);
  }
  function stopPulse() {
    if (pulseRAF) { cancelAnimationFrame(pulseRAF); pulseRAF = null; }
    core.style.transform = '';
  }

  window.jarvis.onPlayAudio((file) => {
    wireAnalyser();
    player.src = 'file:///' + String(file).replace(/\\/g, '/');
    player.play().catch(() => {});
  });
  // Jarvis's own voice drives both the pulse AND the wake-word suppression: the reply must not re-trigger
  // "Jarvis" (replyEnd re-arms the cooldown from the moment playback finishes, not when the user stopped).
  player.addEventListener('play',  () => { startPulse(); wakeDispatch('replyStart'); });
  player.addEventListener('ended', () => { stopPulse();  wakeDispatch('replyEnd'); });
  player.addEventListener('pause', () => { stopPulse(); });

  document.body.addEventListener('click', () => window.jarvis.summonToggle());
  document.body.addEventListener('contextmenu', (e) => { e.preventDefault(); window.jarvis.orbHide(); });

  // ---- voice input: record until silence, ship 16 kHz WAV to main for whisper ----
  const SILENCE_RMS_DEFAULT = 0.012;  // silence gate used until the room's noise floor is measured
  const CALIBRATION_MS = 300;         // sample ambient noise this long before judging speech vs silence
  const SILENCE_STOP_MS = 1800;   // this long after speech = done talking
  const NO_SPEECH_MS = 6000;      // never spoke at all = cancel
  const MAX_MS = 30000;           // hard cap per utterance
  let mic = null;

  // ambient-adaptive silence gate: threshold = (low-percentile noise floor) x margin, clamped so a
  // dead-silent room stays sensitive and a loud room never pushes the bar above real speech. Replaces
  // the old blind 0.012 constant that had to be hand-tuned per room. Pure + unit-tested (vad-calibration).
  function calibrateSilenceRms(samples) {
    // 0.012 fallback = the original hand-tuned fixed threshold, used when there are no calibration samples.
    // PCTL 0.25 (not mean/median) so a stray transient - or speech that starts mid-calibration - can't
    // inflate the floor: the quiet frames still dominate the low percentile. MAX capped at 0.02 (not
    // 0.05): the calibration window is only ~3-4 frames, so if the user speaks immediately the floor can
    // read high; a low cap keeps the gate below soft speech (~0.03) so quiet commands aren't discarded.
    // noiseSuppression is on, so real ambient stays well under 0.02 and the cap rarely bites legitimately.
    const MARGIN = 2.5, MIN = 0.008, MAX = 0.02, PCTL = 0.25;
    if (!samples || samples.length === 0) return 0.012;
    const sorted = samples.slice().sort((a, b) => a - b);
    const floor = sorted[Math.min(sorted.length - 1, Math.floor(sorted.length * PCTL))];
    return Math.min(MAX, Math.max(MIN, floor * MARGIN));
  }

  async function micStart() {
    if (mic) return;
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
    } catch { window.jarvis.micCancelled('denied'); return; }
    const ctx = new AudioContext();
    const src = ctx.createMediaStreamSource(stream);
    const proc = ctx.createScriptProcessor(4096, 1, 1);
    mic = { ctx, stream, proc, chunks: [], rate: ctx.sampleRate, spoke: false, silentMs: 0,
            t0: performance.now(), calib: [], threshold: SILENCE_RMS_DEFAULT, calibrated: false };
    src.connect(proc); proc.connect(ctx.destination);
    document.body.classList.add('listening');
    wakeDispatch('listenStart');   // keep the wake gate in sync no matter what started this listen
    proc.onaudioprocess = (e) => {
      if (!mic) return;
      const data = e.inputBuffer.getChannelData(0);
      mic.chunks.push(new Float32Array(data));
      let sum = 0;
      for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
      const rms = Math.sqrt(sum / data.length);
      core.style.transform = `scale(${1 + Math.min(rms * 20, 0.9)})`;   // orb pulses with YOUR voice too
      const frameMs = (data.length / mic.rate) * 1000;
      const elapsed = performance.now() - mic.t0;
      // measure the room's noise floor first, then adapt the silence gate to it (audio still captured)
      if (!mic.calibrated) {
        mic.calib.push(rms);
        if (elapsed >= CALIBRATION_MS) { mic.threshold = calibrateSilenceRms(mic.calib); mic.calibrated = true; }
        return;   // don't judge speech/silence on the ambient-calibration frames
      }
      if (rms > mic.threshold) { mic.spoke = true; mic.silentMs = 0; } else mic.silentMs += frameMs;
      if ((mic.spoke && mic.silentMs > SILENCE_STOP_MS) || elapsed > MAX_MS) micStop();
      else if (!mic.spoke && elapsed > NO_SPEECH_MS) micStop(true);
    };
  }

  function micStop(cancel) {
    if (!mic) return;
    const m = mic; mic = null;
    document.body.classList.remove('listening');
    wakeDispatch('listenEnd');   // arm the cooldown so the spoken reply can't re-trigger the wake word
    core.style.transform = '';
    try { m.proc.disconnect(); m.stream.getTracks().forEach((t) => t.stop()); m.ctx.close(); } catch {}
    if (cancel || !m.spoke) { window.jarvis.micCancelled(); return; }
    document.body.classList.add('thinking');
    window.jarvis.micAudio(encodeWav16k(m.chunks, m.rate)).finally(() => document.body.classList.remove('thinking'));
  }

  // mono float32 @ device rate -> 16-bit PCM 16 kHz WAV (exactly what whisper.cpp eats)
  function encodeWav16k(chunks, inRate) {
    let len = 0;
    for (const c of chunks) len += c.length;
    const all = new Float32Array(len);
    let o = 0;
    for (const c of chunks) { all.set(c, o); o += c.length; }
    const ratio = inRate / 16000, outLen = Math.floor(all.length / ratio);
    const pcm = new Int16Array(outLen);
    for (let i = 0; i < outLen; i++) {
      // average each output sample's source window (box filter) so >8 kHz content can't alias into speech
      const a = Math.floor(i * ratio), b = Math.min(Math.ceil((i + 1) * ratio), all.length);
      let sum = 0;
      for (let j = a; j < b; j++) sum += all[j];
      const s = Math.max(-1, Math.min(1, sum / (b - a)));
      pcm[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
    }
    const buf = new ArrayBuffer(44 + pcm.length * 2);
    const v = new DataView(buf);
    const w = (off, str) => { for (let i = 0; i < str.length; i++) v.setUint8(off + i, str.charCodeAt(i)); };
    w(0, 'RIFF'); v.setUint32(4, 36 + pcm.length * 2, true); w(8, 'WAVE');
    w(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
    v.setUint32(24, 16000, true); v.setUint32(28, 32000, true); v.setUint16(32, 2, true); v.setUint16(34, 16, true);
    w(36, 'data'); v.setUint32(40, pcm.length * 2, true);
    new Int16Array(buf, 44).set(pcm);
    return buf;
  }

  // ---- wake word ("Jarvis"): always-listening trigger, OFF by default (CONFIG wake_word) ----
  // Pure gate: decides when a detection actually starts a listen, and enforces a post-reply cooldown so
  // the spoken response (or a repeated wake word) can't immediately re-trigger the mic. Unit-tested
  // (wakeword-gate). The Porcupine binding below is the one piece not yet field-tested - see README.
  function wakeReducer(state, event) {
    const cd = event.cooldownMs || 1500;
    switch (event.type) {
      case 'wake':
        if (state.listening) return { state, arm: false };            // a real listen is in progress
        if (state.speaking) return { state, arm: false };             // Jarvis is speaking its reply
        if (event.now < state.cooldownUntil) return { state, arm: false };
        // Arm, and set a short guard window - but do NOT latch listening:true here. If the listen never
        // actually starts (e.g. STT unavailable, main early-returns), nothing would ever clear a latch
        // and the wake word would wedge forever; the guard just expires instead. Only listenStart marks
        // a real listen.
        return { state: { listening: false, speaking: false, cooldownUntil: event.now + cd }, arm: true };
      case 'listenStart':
        return { state: { listening: true, speaking: false, cooldownUntil: state.cooldownUntil }, arm: false };
      case 'listenEnd':
        return { state: { listening: false, speaking: state.speaking, cooldownUntil: event.now + cd }, arm: false };
      case 'replyStart':
        return { state: { listening: state.listening, speaking: true, cooldownUntil: state.cooldownUntil }, arm: false };
      case 'replyEnd':
        return { state: { listening: false, speaking: false, cooldownUntil: event.now + cd }, arm: false };
      default:
        return { state, arm: false };
    }
  }
  let wakeState = { listening: false, speaking: false, cooldownUntil: 0 };
  const WAKE_COOLDOWN_MS = 1500;
  function wakeDispatch(type) {
    const r = wakeReducer(wakeState, { type, now: performance.now(), cooldownMs: WAKE_COOLDOWN_MS });
    wakeState = r.state;
    if (r.arm) window.jarvis.wakeDetected();   // ask main to start a listen (reuses the whole pipeline)
  }

  let porcupine = null;
  async function initWakeWord(cfg) {
    // Entirely inert unless enabled AND a key is present, so the default (wake_word: off) can never
    // destabilise the working orb. Any failure degrades to "no wake word", never a broken orb.
    if (!cfg || !cfg.enabled) return;
    if (!cfg.accessKey) { console.warn('[wake] enabled but no Picovoice AccessKey - see README wake-word setup'); return; }
    try {
      const p = await import('../vendor/porcupine/porcupine-web.js');   // vendored during setup
      porcupine = await p.PorcupineWorker.create(
        cfg.accessKey,
        [p.BuiltInKeyword.Jarvis],                    // "Jarvis" is a free Porcupine built-in keyword
        () => wakeDispatch('wake'),
      );
      const wvp = await import('../vendor/porcupine/web-voice-processor.js');
      await wvp.WebVoiceProcessor.subscribe(porcupine);
      console.log('[wake] listening for "Jarvis"');
    } catch (e) {
      console.warn('[wake] init failed (staying off): ' + e.message + ' - see README wake-word setup');
    }
  }

  window.jarvis.onMicStart(() => micStart());
  window.jarvis.onMicStop(() => micStop());
  window.jarvis.onMicCancel(() => micStop(true));   // discard, never transcribe (typing/summon closed)
  window.jarvis.onWakeConfig((cfg) => initWakeWord(cfg));
</script>
</body>
</html>
